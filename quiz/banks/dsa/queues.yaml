note: dsa/queues.md
tier: detail
questions:
  - id: deque-indexing
    type: mcq
    q: What is the complexity of `d[i]` (random access) on a `collections.deque`?
    options:
      - O(n) — deque is a linked list of blocks, not a contiguous array
      - O(1) — same as a list
      - O(log n) — deque keeps a skip index
      - It raises `TypeError` — deques don't support indexing
    explain: deque trades random access for O(1) mutation at both ends. Use list for indexing, deque for FIFO/sliding windows.
  - id: nlargest-vs-sorted
    type: mcq
    q: Why is `heapq.nlargest(3, lst)` faster than `sorted(lst)[-3:]` for large lists?
    options:
      - It maintains a heap of size k while scanning — O(n log k) vs O(n log n)
      - It short-circuits after finding 3 values above the mean
      - It runs in C while `sorted` runs in Python
      - It samples the list probabilistically
    explain: With n=1,000,000 and k=3 that's ~3M vs ~20M comparisons. Breakeven is roughly k > n/log(n).
  - id: max-heap-workaround
    type: mcq
    q: heapq only provides a min-heap. What is the standard max-heap workaround?
    options:
      - Push negated values and negate again on pop
      - Pass `reverse=True` to `heappush`
      - Use `heapq.maxheapify` first
      - Pop from the end of the list instead of index 0
    explain: "`heappush(h, -value)` then `-heappop(h)` — tuples with negated priority work the same way for objects."
  - id: bounded-deque
    type: recall
    q: What does `deque(maxlen=5)` do when a 6th element is appended, and what is it useful for?
    answer: It silently drops the element from the opposite end — the deque keeps only the most recent 5. Useful for sliding windows and "last N items" buffers without manual trimming.
