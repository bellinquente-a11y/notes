note: python/language/functional/itertools/filtering.md
tier: detail
questions:
  - id: takewhile-stop
    type: mcq
    q: "What does `takewhile(lambda x: x < 5, [1, 3, 4, 6, 1, 2])` yield?"
    options:
      - "`1, 3, 4` — stops permanently at 6, even though later elements match again"
      - "`1, 3, 4, 1, 2` — all elements below 5"
      - "`6` — the first failure"
      - "`1, 3, 4, 6` — inclusive of the boundary"
    explain: takewhile reads a contiguous prefix and stops at the first failure. For scattered matches, use filter — it scans the whole stream.
  - id: dropwhile-mode
    type: mcq
    q: "After `dropwhile`'s predicate first returns False, what happens to the remaining elements?"
    options:
      - All are yielded without re-testing — it switches to yield-all mode
      - Each is still tested and dropped if the predicate holds
      - Iteration stops
      - They are collected into a list and returned at once
    explain: "`dropwhile(lambda x: x < 5, [1, 3, 4, 6, 1, 2])` → `6, 1, 2`. Good for skipping warm-up periods in ordered data."
  - id: compress-truncation
    type: mcq
    q: "In `compress(data, selectors)`, what happens if the two iterables have different lengths?"
    options:
      - It silently stops at the shorter one — no error
      - It raises `ValueError`
      - Missing selectors default to truthy
      - Missing selectors default to falsy
    explain: compress is the lazy analog of NumPy boolean masking; the silent truncation is the gotcha to remember.
  - id: filter-partition
    type: recall
    q: How do you partition a stream into matching and non-matching elements with the filtering tools?
    answer: "Materialise once (`items = list(iterable)`), then `filter(pred, items)` for matches and `itertools.filterfalse(pred, items)` for the complement. Also: `filter(None, it)` keeps truthy values."
